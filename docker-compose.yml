version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: homestorage-db
    environment:
      POSTGRES_DB: homestorage
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securePassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homestorage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d homestorage"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: homestorage-storage
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - homestorage-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: homestorage-app
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USER: admin
      DB_PASSWORD: securePassword123
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      JWT_SECRET: your-very-secure-jwt-secret-key-at-least-256-bits-long-12345678901234567890123456789012
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - homestorage-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  homestorage-network:
    driver: bridge